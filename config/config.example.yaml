# W.I.T.E.K — Wirtualny Informator Taktyczno-Ekonomiczny Koalicji
# Konfiguracja

travian:
  server_url: "https://ts31.x3.europe.travian.com"
  map_size: 401  # 401x401 torus

  # Nasze sojusze (alliance IDs z map.sql)
  our_alliances: []
  # our_alliances: [123, 456, 789]

scheduler:
  # Interwał pobierania map.sql w minutach (map.sql aktualizuje się co ~15 min)
  fetch_interval_minutes: 60

alerts:
  # Próg spadku populacji dla alertu
  pop_drop_threshold: 50
  # Radius dla alertu "nowa wioska wroga"
  new_village_radius: 30
