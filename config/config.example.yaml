# W.I.T.E.K — Wirtualny Informator Taktyczno-Ekonomiczny Koalicji
# Konfiguracja — wybór serwera: ustaw SERVER_PROFILE w .env

servers:
  ts31:
    url: "https://ts31.x3.europe.travian.com"
    speed: 3
    map_size: 401
    troop_speed_multiplier: 2
    tribes: [1, 2, 3, 6, 7]
    our_alliances: []
    features:
      ships: false
      regions: false
      cities: false
      harbors: false
      victory_points: false
    legionnaire_rebalanced: false

  # rof-x3:
  #   url: "https://rof.x3.international.travian.com"
  #   speed: 3
  #   map_size: 401
  #   troop_speed_multiplier: 2
  #   tribes: [1, 3, 6, 7, 8, 9]
  #   our_alliances: []
  #   features:
  #     ships: true
  #     regions: true
  #     cities: true
  #     harbors: true
  #     victory_points: true
  #   legionnaire_rebalanced: true

scheduler:
  fetch_interval_minutes: 60

alerts:
  pop_drop_threshold: 25
  min_pop_for_alerts: 500
  alert_cooldown_hours: 6
  new_village_radius: 30
  max_alerts_per_type: 10

attacks:
  auto_resolve_after_minutes: 120

extension:
  enabled: true
