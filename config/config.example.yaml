# W.I.T.E.K — Konfiguracja domyślna repo (RoF x3)
# Dzisiejszy smoke test na x10 zrób przez tymczasowe TRAVIAN_SERVER_URL w .env
# Preset klasycznego ts31 został odłożony do legacy\ts31\config.example.yaml

servers:
  rof-x3:
    url: "https://rof.x3.international.travian.com"
    speed: 3
    map_size: 401
    troop_speed_multiplier: 2
    tribes: [1, 3, 6, 7, 8, 9]
    our_alliances: []
    features:
      ships: true
      regions: true
      cities: true
      harbors: true
      victory_points: true
      map_edge_wrapping: false
    legionnaire_rebalanced: true

scheduler:
  fetch_interval_minutes: 60

alerts:
  pop_drop_threshold: 25
  min_pop_for_alerts: 500
  alert_cooldown_hours: 6
  new_village_radius: 30
  max_alerts_per_type: 10

attacks:
  auto_resolve_after_minutes: 120

extension:
  enabled: true
