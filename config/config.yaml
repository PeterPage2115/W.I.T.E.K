# W.I.T.E.K — Konfiguracja aktywna (RoF-first)
# Jeśli dziś testujesz na x10, zostaw SERVER_PROFILE=rof-x3 i nadpisz tylko TRAVIAN_SERVER_URL w .env

servers:
  rof-x3:
    url: "https://rof.x3.international.travian.com"
    speed: 3
    map_size: 401
    troop_speed_multiplier: 2
    tribes: [1, 3, 6, 7, 8, 9]
    our_alliances: []
    features:
      ships: true
      regions: true
      cities: true
      harbors: true
      victory_points: true
      map_edge_wrapping: false
    legionnaire_rebalanced: true

  ts31:
    url: "https://ts31.x3.europe.travian.com"
    speed: 3
    map_size: 401
    troop_speed_multiplier: 2
    tribes: [1, 2, 3, 6, 7]
    our_alliances: [14, 32, 46, 120]
    features:
      ships: false
      regions: false
      cities: false
      harbors: false
      victory_points: false
      map_edge_wrapping: true
    legionnaire_rebalanced: false

scheduler:
  fetch_cron_hour: 0
  fetch_cron_minute: 5

alerts:
  pop_drop_threshold: 25
  min_pop_for_alerts: 500
  alert_cooldown_hours: 6
  new_village_radius: 30
  max_alerts_per_type: 10

attacks:
  auto_resolve_after_minutes: 120

extension:
  enabled: true
