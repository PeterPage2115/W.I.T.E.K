# W.I.T.E.K — Docker Compose (produkcja)
# Uruchomienie: docker compose up -d
# Konfiguracja: skopiuj .env.example → .env i uzupełnij wartości

services:
  # ---------- Baza danych PostgreSQL ----------
  # Przechowuje wszystkie dane W.I.T.E.K-a: snapshoty map.sql, graczy, sojusze.
  # Dane są zachowane w wolumenie "witek-rof-pgdata" nawet po usunięciu kontenera.
  witek-db:
    image: postgres:16-alpine
    container_name: witek-rof-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-witek_rof}
      POSTGRES_USER: ${POSTGRES_USER:-witek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Ustaw POSTGRES_PASSWORD w pliku .env}
    volumes:
      - witek-rof-pgdata:/var/lib/postgresql/data
    networks:
      - witek-rof-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-witek} -d ${POSTGRES_DB:-witek_rof}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------- Aplikacja W.I.T.E.K (Flask + Discord bot + scheduler) ----------
  # Serwer webowy z dashboardem, bot Discord i codzienny scheduler pobierający map.sql.
  # Łączy się z bazą PostgreSQL przez zmienną DATABASE_URL.
  witek-app:
    image: ghcr.io/peterpage2115/w.i.t.e.k:latest
    container_name: witek-rof-app
    restart: unless-stopped
    ports:
      - "${WITEK_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      # Nadpisujemy DATABASE_URL żeby wskazywał na kontener PostgreSQL
      DATABASE_URL: postgresql://${POSTGRES_USER:-witek}:${POSTGRES_PASSWORD}@witek-db:5432/${POSTGRES_DB:-witek_rof}
      SERVER_PROFILE: ${SERVER_PROFILE:-rof-x3}
      FLASK_DEBUG: "false"
    volumes:
      # Konfiguracja YAML — cały folder, entrypoint auto-kopiuje example jeśli brakuje
      - ./config:/app/config
    depends_on:
      witek-db:
        condition: service_healthy
    networks:
      - witek-rof-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ---------- Wolumeny ----------
# Trwałe dane PostgreSQL — przetrwają restart i usunięcie kontenerów
volumes:
  witek-rof-pgdata:
    name: witek-rof-pgdata

# ---------- Sieć ----------
# Wewnętrzna sieć łącząca aplikację z bazą danych
networks:
  witek-rof-net:
    name: witek-rof-net
