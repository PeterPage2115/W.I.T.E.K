{% extends "base.html" %}

{% block title %}Mapa{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
    #map-container {
        height: calc(100vh - 180px);
        min-height: 500px;
        border-radius: 6px;
        border: 2px solid #8b6f5e;
    }
    .leaflet-popup-content-wrapper {
        background: linear-gradient(135deg, #f5e6c8, #e8d4a8);
        border: 2px solid #8b6f5e;
        color: #3c2a1a;
        font-family: 'Inter', sans-serif;
    }
    .leaflet-popup-tip { background: #e8d4a8; }
    .map-search {
        position: absolute; top: 10px; right: 10px; z-index: 1000;
        background: rgba(245, 230, 200, 0.95); border: 2px solid #8b6f5e;
        border-radius: 6px; padding: 8px; max-width: 280px;
    }
    .map-legend {
        position: absolute; bottom: 30px; left: 10px; z-index: 1000;
        background: rgba(245, 230, 200, 0.95); border: 2px solid #8b6f5e;
        border-radius: 6px; padding: 8px;
    }
    .filter-btn.active { outline: 2px solid #c8a415; outline-offset: 1px; }
    .marker-cluster-small {
        background-color: rgba(90, 154, 10, 0.6);
    }
    .marker-cluster-small div {
        background-color: rgba(90, 154, 10, 0.8);
    }
    .marker-cluster-medium {
        background-color: rgba(241, 211, 87, 0.6);
    }
    .marker-cluster-medium div {
        background-color: rgba(241, 211, 87, 0.8);
    }
    .marker-cluster-large {
        background-color: rgba(192, 57, 43, 0.6);
    }
    .marker-cluster-large div {
        background-color: rgba(192, 57, 43, 0.8);
    }
    .marker-cluster div {
        color: #fff;
        font-weight: bold;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="trav-panel mb-4">
    <div class="trav-panel-header">
        <h2 class="font-medieval text-lg">🗺️ Mapa świata</h2>
    </div>
    <div class="p-1 relative">
        <div id="map-container"></div>

        <!-- Search overlay -->
        <div class="map-search">
            <input id="search-input" type="text" placeholder="Szukaj gracza/sojuszu..."
                   class="w-full px-3 py-1.5 text-sm bg-white border border-trav-brown-light rounded">
            <div class="flex flex-wrap gap-1 mt-2">
                <button class="filter-btn px-2 py-0.5 text-xs rounded bg-trav-green text-white" data-filter="ours">Nasze</button>
                <button class="filter-btn px-2 py-0.5 text-xs rounded bg-trav-red text-white" data-filter="enemies">Wrogowie</button>
                <button class="filter-btn px-2 py-0.5 text-xs rounded bg-gray-500 text-white active" data-filter="all">Wszyscy</button>
            </div>
            <div id="stats" class="text-xs mt-2 text-trav-text-muted"></div>
        </div>

        <!-- Legend -->
        <div class="map-legend text-xs">
            <div class="font-bold mb-1">Legenda:</div>
            <div><span class="inline-block w-3 h-3 rounded-full bg-[#5a9a0a] mr-1"></span> Nasz sojusz</div>
            <div><span class="inline-block w-3 h-3 rounded-full bg-[#c0392b] mr-1"></span> Wrogowie</div>
            <div><span class="inline-block w-3 h-3 rounded-full bg-gray-400 mr-1"></span> Neutralni</div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
(function() {
    const map = L.map('map-container', {
        crs: L.CRS.Simple,
        minZoom: -2,
        maxZoom: 4,
        zoomSnap: 0.5,
        zoomDelta: 0.5,
    });

    const bounds = [[-200, -200], [200, 200]];
    map.fitBounds(bounds);

    // Grid lines every 50 fields
    for (let i = -200; i <= 200; i += 50) {
        L.polyline([[i, -200], [i, 200]], {color: '#555', weight: 0.3, opacity: 0.5}).addTo(map);
        L.polyline([[-200, i], [200, i]], {color: '#555', weight: 0.3, opacity: 0.5}).addTo(map);
    }

    // Center marker
    L.marker([0, 0], {
        icon: L.divIcon({className: 'text-lg', html: '⭐', iconSize: [20, 20], iconAnchor: [10, 10]})
    }).addTo(map).bindPopup('Centrum mapy (0|0)');

    const OUR_ALLIANCES = {{ our_alliances | tojson }};
    const SERVER_URL = {{ config.TRAVIAN_SERVER_URL | default('', true) | tojson }};

    let allVillages = [];
    let markers = L.markerClusterGroup({
        maxClusterRadius: 40,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true,
        disableClusteringAtZoom: 3,
        chunkedLoading: true,
        chunkInterval: 100,
        chunkDelay: 10,
    }).addTo(map);
    let activeFilter = 'all';

    function getColor(village) {
        if (village.is_ours) return '#5a9a0a';
        if (village.aid > 0) return '#c0392b';
        return '#888';
    }

    function getRadius(pop) {
        if (pop > 1000) return 5;
        if (pop > 500) return 4;
        if (pop > 200) return 3;
        return 2;
    }

    const tribeNames = {{ TRIBE_NAMES | tojson }};

    function renderMarkers(villages) {
        markers.clearLayers();
        const markerList = [];
        villages.forEach(function(v) {
            const color = getColor(v);
            const marker = L.circleMarker([v.y, v.x], {
                radius: getRadius(v.pop),
                color: color,
                fillColor: color,
                fillOpacity: 0.7,
                weight: 1,
            });

            const tribe = tribeNames[v.tid] || '?';
            const coordText = '[' + v.x + '|' + v.y + ']';
            let mapLink = coordText;
            if (SERVER_URL) {
                mapLink = '<a href="' + SERVER_URL + '/karte.php?x=' + v.x + '&y=' + v.y +
                          '" target="_blank" style="color:#2980b9">' + coordText + '</a>';
            }

            marker.bindPopup(
                '<div class="text-sm">' +
                '<b>' + (v.name || '?') + '</b> ' + mapLink + '<br>' +
                '👤 ' + (v.player || 'Natury') + '<br>' +
                '🏰 ' + (v.alliance || '—') + '<br>' +
                '📊 Pop: ' + (v.pop != null ? v.pop.toLocaleString('pl-PL') : '?') + '<br>' +
                tribe +
                '</div>'
            );

            markerList.push(marker);
        });
        markers.addLayers(markerList);
    }

    function applyFilters() {
        const q = document.getElementById('search-input').value.toLowerCase();
        let filtered = allVillages;

        if (activeFilter === 'ours') {
            filtered = filtered.filter(function(v) { return v.is_ours; });
        } else if (activeFilter === 'enemies') {
            filtered = filtered.filter(function(v) { return !v.is_ours && v.aid > 0; });
        }

        if (q) {
            filtered = filtered.filter(function(v) {
                return (v.player && v.player.toLowerCase().indexOf(q) !== -1) ||
                       (v.alliance && v.alliance.toLowerCase().indexOf(q) !== -1) ||
                       (v.name && v.name.toLowerCase().indexOf(q) !== -1);
            });
        }

        renderMarkers(filtered);
        document.getElementById('stats').textContent =
            filtered.length + ' / ' + allVillages.length + ' wiosek';
    }

    document.getElementById('search-input').addEventListener('input', applyFilters);

    document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            activeFilter = this.dataset.filter;
            applyFilters();
        });
    });

    fetch('/api/map/villages')
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
            allVillages = data;
            renderMarkers(allVillages);
            document.getElementById('stats').textContent =
                allVillages.length + ' wiosek na mapie';
        });
})();
</script>
{% endblock %}
