<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>W.I.T.E.K — Ustawienia</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚔️ W.I.T.E.K</h1>
      <p class="subtitle">Travian Assistant</p>
    </div>

    <div class="form-group">
      <label for="server-url">Adres serwera W.I.T.E.K</label>
      <input type="url" id="server-url" placeholder="http://localhost:5000">
    </div>

    <div class="form-group">
      <label for="token">Token API</label>
      <input type="password" id="token" placeholder="Wklej token...">
    </div>

    <div class="form-group toggle">
      <label for="enabled">Rozszerzenie aktywne</label>
      <input type="checkbox" id="enabled">
    </div>

    <div class="actions">
      <button id="save-btn" class="btn primary">💾 Zapisz</button>
      <button id="test-btn" class="btn secondary">🔗 Testuj połączenie</button>
    </div>

    <div id="status" class="status"></div>

    <div class="footer">
      <p>⚔️ W.I.T.E.K — Na cześć Gucio</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
